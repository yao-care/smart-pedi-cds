name: CI
on:
  pull_request:
  push:
    branches: [main]

# 供應鏈防護：所有 action 一律 pin 到 40-char commit SHA。
# mutable tag（@v6）可被 action 擁有者靜默重指，見 trivy-action / kics-github-action 事件。
# 升版流程：改 SHA 並同步更新行末 tag 註解（`gh api repos/OWNER/REPO/commits/TAG --jq .sha`）。
jobs:
  index-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:video-index
      - name: Fail if generated index drifted
        run: |
          if ! git diff --exit-code public/data/video-index.json; then
            echo "::error::video-index.json out of sync. Run 'pnpm build:video-index' and commit."
            exit 1
          fi
      - run: pnpm test

  lighthouse:
    runs-on: ubuntu-latest
    needs: index-consistency
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx @lhci/cli autorun
