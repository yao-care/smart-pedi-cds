name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm lint --max-warnings 10
      - run: pnpm build
        env:
          PUBLIC_CONTRIBUTION_WORKER_URL: ${{ vars.PUBLIC_CONTRIBUTION_WORKER_URL }}
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --root-dir ./dist --base https://smart-pedi-cds.yao.care/ --offline ./dist
          fail: true
      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
