# Pediatric Default Alert Rules
# Top-level key "default" becomes the entry ID for the file() loader.

default:
  version: "1.0.0"

  age_groups:
    infant:
      heart_rate:
        normal: [100, 160]
        advisory: [90, 170]
        warning: [80, 180]
      spo2:
        normal: [95, 100]
        advisory: [93, 100]
        warning: [90, 100]
      respiratory_rate:
        normal: [30, 60]
        advisory: [25, 65]
        warning: [20, 70]
      temperature:
        normal: [36.5, 37.5]
        advisory: [36.0, 38.0]
        warning: [35.5, 38.5]
      sleep_quality:
        normal: [60, 100]
        advisory: [45, 100]
        warning: [30, 100]
      activity_level:
        normal: [30, 100]
        advisory: [20, 100]
        warning: [10, 100]
      sugar_intake:
        normal: [0, 25]
        advisory: [0, 35]
        warning: [0, 50]

    toddler:
      heart_rate:
        normal: [90, 150]
        advisory: [80, 160]
        warning: [70, 170]
      spo2:
        normal: [95, 100]
        advisory: [93, 100]
        warning: [90, 100]
      respiratory_rate:
        normal: [24, 40]
        advisory: [20, 45]
        warning: [16, 50]
      temperature:
        normal: [36.5, 37.5]
        advisory: [36.0, 38.0]
        warning: [35.5, 38.5]
      sleep_quality:
        normal: [55, 100]
        advisory: [40, 100]
        warning: [25, 100]
      activity_level:
        normal: [40, 100]
        advisory: [25, 100]
        warning: [15, 100]
      sugar_intake:
        normal: [0, 30]
        advisory: [0, 40]
        warning: [0, 55]

    preschool:
      heart_rate:
        normal: [80, 130]
        advisory: [70, 140]
        warning: [60, 150]
      spo2:
        normal: [95, 100]
        advisory: [93, 100]
        warning: [90, 100]
      respiratory_rate:
        normal: [20, 30]
        advisory: [16, 35]
        warning: [12, 40]
      temperature:
        normal: [36.5, 37.5]
        advisory: [36.0, 38.0]
        warning: [35.5, 38.5]
      sleep_quality:
        normal: [50, 100]
        advisory: [35, 100]
        warning: [20, 100]
      activity_level:
        normal: [45, 100]
        advisory: [30, 100]
        warning: [20, 100]
      sugar_intake:
        normal: [0, 35]
        advisory: [0, 45]
        warning: [0, 60]

  escalation:
    advisory_to_warning_hours: 48
    warning_to_critical_hours: 24

  deduplication:
    window_minutes: 60

  missing_data:
    alert_after_hours: 24

  multi_indicator:
    advisory_count_for_warning: 2

  trend:
    consecutive_days_for_escalation: 3
